<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>𓆩♡𓆪 Scent Roasting Lab 𓆩♡𓆪</title>
    <style>
        body { background: #ffd1dc; font-family: "Courier New", monospace; color: #ff1493; padding: 20px; text-align: center; }
        .gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff0f5; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; }
        .mixer { background: #fff; border: 4px ridge #ff1493; padding: 25px; margin-top: 40px; box-shadow: 6px 6px 0px #ff69b4; }
        .mix-btn { background: #ff1493; color: white; padding: 15px 30px; font-weight: bold; cursor: pointer; border: 3px outset #ffb6c1; margin-top: 20px;}
        .results { margin-top: 25px; padding: 20px; border: 2px dashed #ff1493; background: #fff5f7; display: none; text-align: left; }
    </style>
</head>
<body>

  <!-- THE SARCASTIC GATE -->
  <div class="gate" id="gate">
    <h1 style="font-size: 24px;">🎀 Oh, so you want to play? 🎀</h1>
    <p>Welcome to the Fragrance Roast. I'm going to judge your taste and I'm not going to be nice about it. If you're sensitive, maybe go watch a makeup tutorial instead?</p>
    <button class="mix-btn" onclick="document.getElementById('gate').style.display='none'">I’m ready, ruin my day</button>
  </div>

  <div class="mixer">
    <h3>✨ The Compatibility Lab ✨</h3>
    <select id="s1"></select> + <select id="s2"></select>
    <br><button class="mix-btn" onclick="runLab()">ANALYZE MY VIBE</button>
    <div class="results" id="res">
      <h3 id="resTitle"></h3>
      <p id="resScore" style="font-weight:bold;"></p>
      <p id="resRead"></p>
      <p id="resStory" style="font-style:italic; border-left:3px solid #ff1493; padding-left:10px;"></p>
    </div>
  </div>

  <script>
    const inv = ["Lattafa Eclaire", "Banoffi Eclaire", "Pistachio Eclaire", "Choco Musk", "Sticky Dates", "Sweet Tooth", "Pink Sugar", "Caramel Pop", "Taskeen", "Bianco Latte", "PDM Delina", "Burberry Her", "Prada Paradoxe", "Vanilla 28", "Burning Cherry", "Juicy Apple", "Fields At Night", "Bonbon", "Mon Guerlain", "Poison Girl", "YSL Libre", "Eilish No 1", "Khamrah", "SDJ 62", "SDJ 71", "SDJ 40", "Vanilla Visual", "NEST Vanilla", "Mataha", "Vanille Absolu", "Cloud", "Mod Vanilla", "Sweet Like Candy", "Gold Couture", "Mon Paris", "Lychee", "Citrus Sorbet", "Candy Love", "Fantasy", "Yara Pink", "Black Opium", "Le Parfum", "LDBS", "Killian Princess", "Milk", "Fireplace", "Coffee Break", "Good Girl", "Nebras", "Fresh Cream"];
    
    // I expanded these pools so it doesn't repeat!
    const hypeReads = ["Main character energy. You're literally perfect.", "Obsessed. This is the only scent profile that matters.", "You didn't come to play, you came to win. Slay.", "Pure aesthetic bliss. Everyone in a 10-mile radius is jealous.", "This is elite-tier. You clearly understand how to exist."];
    const hypeStories = ["You walked into a room and people actually stopped talking to look at you. Iconic.", "You had the best hair day of your life and everyone complimented you. We love that for you.", "Everything you touched today turned to gold. Honestly, go off.", "You didn't even have to try today; you just existed and the universe rewarded you.", "Your vibe is so immaculate today that a literal rainbow appeared when you stepped outside."];
    
    const midReads = ["You're playing it so safe it's actually painful.", "It's giving 'I bought this at a drugstore because it was on sale.'", "You are the human equivalent of a screen saver. Boring.", "You’re not failing, but you’re definitely not interesting.", "This combo is basic. Do better next time, bestie."];
    const midStories = ["You walked into the store and felt absolutely nothing. How does it feel to be unremarkable?", "You bought an iced coffee, drank it, and then went to sleep. Peak mediocrity.", "You tried to take a selfie but the lighting was just off. So sad.", "You sat on your phone for three hours. The most interesting thing you did was blink.", "You went to the park and a squirrel looked at you and then just turned around."];
    
    const meanReads = ["Wake up, freak. You smell like pure dumpster fire.", "This is a hate crime against my nose. Are you trying to get cancelled?", "You smell like a damp locker room that caught a virus. Get help.", "This combo is repulsive. You have zero taste.", "Do yourself a favor and shower until this scent is completely gone."];
    const meanStories = ["The local barista gagged when you walked in. You didn't get your drink. You deserved it.", "You went on a date and the person just walked away without saying a word. I don't blame them.", "Your cat ran away from you because you smelled like a toxic chemical spill. Good luck finding him.", "You fell into a puddle while trying to look cool. Everyone saw it. Everyone laughed.", "You got stood up, rained on, and lost your wallet. This is what you get for wearing this."];

    const s1 = document.getElementById('s1'); const s2 = document.getElementById('s2');
    inv.forEach(i => { s1.add(new Option(i, i)); s2.add(new Option(i, i)); });

    function runLab() {
        const v1 = document.getElementById('s1').value; const v2 = document.getElementById('s2').value;
        const seed = (v1.length + v2.length) % 100;
        document.getElementById('resTitle').innerHTML = `Mix: ${v1} + ${v2}`;
        document.getElementById('res').style.display = 'block';
        
        if (v1 === v2) {
            document.getElementById('resScore').innerHTML = "0% (SOCIOPATH ALERT)";
            document.getElementById('resRead').innerHTML = "You layered the same thing twice. You have zero soul.";
            document.getElementById('resStory').innerHTML = "You achieved nothing today and the air density in your room is now unbearable. Please leave.";
        } else if (seed > 60) {
            document.getElementById('resScore').innerHTML = `${seed}% (SLAY)`;
            document.getElementById('resRead').innerHTML = hypeReads[seed % hypeReads.length];
            document.getElementById('resStory').innerHTML = hypeStories[seed % hypeStories.length];
        } else if (seed > 30) {
            document.getElementById('resScore').innerHTML = `${seed}% (BASIC)`;
            document.getElementById('resRead').innerHTML = midReads[seed % midReads.length];
            document.getElementById('resStory').innerHTML = midStories[seed % midStories.length];
        } else {
            document.getElementById('resScore').innerHTML = `${seed}% (TRASH)`;
            document.getElementById('resRead').innerHTML = meanReads[seed % meanReads.length];
            document.getElementById('resStory').innerHTML = meanStories[seed % meanStories.length];
        }
    }
  </script>
</body>
</html>
